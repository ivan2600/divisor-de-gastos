<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisor de gastos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Divisor de gastos</h1>
    <label for="new-user">
      Nombre: <input id="new-user" type="text" placeholder="ingresar nombre">
    </label>
    <button id="add-user">Agregar usuario</button>
    <div id="inputs">
      <label for="calculo1">
        <span id="name1"></span><input id="calculo1" type="number" placeholder="ingresar numero">
      </label>
      <button id="btn-calcular1" class="calcular">Calcular</button>
      <label for="calculo2">
        <span id="name2"></span><input id="calculo2" type="number" placeholder="ingresar numero">
      </label>
      <button id="btn-calcular2" class="calcular">Calcular</button>
      <label for="calculo3">
        <span id="name3"></span><input id="calculo3" type="number" placeholder="ingresar numero">
      </label>
      <button id="btn-calcular3" class="calcular">Calcular</button>
      <label for="calculo4">
        <span id="name4"></span><input id="calculo4" type="number" placeholder="ingresar numero">
      </label>
      <button id="btn-calcular4" class="calcular">Calcular</button>
    </div>
    
    
    <p>P1: <span id="person1"></span></p>
    <p>P2: <span id="person2"></span></p>
    <p>P3: <span id="person3"></span></p>
    <p>P4: <span id="person4"></span></p>

    <script src="./main.js"></script>
</body>
</html>
